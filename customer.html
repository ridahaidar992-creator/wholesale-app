<!DOCTYPE html>
<html>
<head>
<title>Products</title>

<style>
body {
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  margin: 0;
  overflow-x: hidden;
}

.topbar {
  display: flex;
  gap: 10px;
  padding: 15px;
  align-items: center;
}

.topbar button {
  padding: 10px 14px;
  background: #00ffc3;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

.search {
  padding: 10px;
  width: 250px;
  border: none;
  border-radius: 6px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  padding: 20px;
  padding-right: 90px;
}

.card {
  background: #111;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.02);
}

.card img {
  width: 100%;
  height: 320px;
  object-fit: cover;
  border-radius: 10px;
  background: #222;
}

.card h3 {
  margin: 12px 0 8px;
}

.card p {
  margin: 0;
}

/* POPUP */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.modal-box {
  background: #111;
  padding: 20px;
  border-radius: 10px;
  width: 340px;
  max-width: 90%;
}

.modal-box img {
  width: 100%;
  height: 260px;
  object-fit: cover;
  border-radius: 10px;
  background: #222;
}

.modal-box input {
  width: 100%;
  box-sizing: border-box;
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 6px;
}

.modal-box button {
  margin-top: 10px;
  margin-right: 8px;
  padding: 10px 14px;
  background: #00ffc3;
  border: none;
  cursor: pointer;
  border-radius: 6px;
  font-weight: bold;
}

/* CART PANEL */
.cart-toggle {
  position: fixed;
  right: 12px;
  top: 12px;
  background: #00ffc3;
  color: black;
  padding: 12px 14px;
  border-radius: 8px;
  cursor: pointer;
  z-index: 1100;
  font-weight: bold;
}

.cart-panel {
  position: fixed;
  right: -380px;
  top: 0;
  width: 360px;
  height: 100%;
  background: #111;
  padding: 20px;
  transition: right 0.3s ease;
  overflow-y: auto;
  z-index: 1050;
  box-sizing: border-box;
  border-left: 1px solid #222;
}

.cart-panel.open {
  right: 0;
}

.cart-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.cart-header button {
  padding: 8px 12px;
  background: #00ffc3;
  border: none;
  cursor: pointer;
  border-radius: 6px;
  font-weight: bold;
}

.cart-item {
  border-bottom: 1px solid #333;
  padding: 12px 0;
}

.cart-item-title {
  font-weight: bold;
  margin-bottom: 6px;
}

.cart-item-line {
  color: #ccc;
  margin: 4px 0;
}

.qty-row {
  margin-top: 8px;
}

.qty-btn {
  margin-right: 6px;
  padding: 5px 10px;
  cursor: pointer;
  border: none;
  border-radius: 5px;
  background: #00ffc3;
  font-weight: bold;
}

.remove-btn {
  margin-left: 6px;
  padding: 5px 10px;
  cursor: pointer;
  border: none;
  border-radius: 5px;
  background: #ff5c5c;
  color: white;
  font-weight: bold;
}

.total-box {
  margin-top: 18px;
  font-size: 24px;
  font-weight: bold;
}

.send-btn {
  margin-top: 16px;
  padding: 12px 16px;
  background: #00ffc3;
  border: none;
  cursor: pointer;
  border-radius: 6px;
  font-weight: bold;
  width: 100%;
}

.empty-text {
  color: #aaa;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="topbar">
  <button onclick="goBack()">⬅ Back</button>
  <input id="search" class="search" placeholder="Search..." oninput="searchProducts()">
</div>

<div class="grid" id="products"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <img id="m-img" src="" alt="Product image">
    <h3 id="m-name"></h3>
    <p id="m-desc"></p>
    <p id="m-price"></p>

    <input id="qty" type="number" min="1" value="1" placeholder="Quantity">

    <button onclick="addToCartFromModal()">Add to Cart</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<!-- CART BUTTON -->
<div class="cart-toggle" onclick="toggleCart()">🛒 Order</div>

<!-- CART PANEL -->
<div class="cart-panel" id="cartPanel">
  <div class="cart-header">
    <h2>Order Details</h2>
    <button onclick="toggleCart()">Hide</button>
  </div>

  <div id="cart"></div>
  <div class="total-box" id="total">Total: $0</div>
  <button class="send-btn" onclick="sendOrder()">Send Order</button>
</div>

<script>
const API = "http://localhost:3000";

let products = [];
let cart = [];
let selected = null;

// LOAD PRODUCTS
async function loadProducts() {
  try {
    const res = await fetch(API + "/products");
    const data = await res.json();

    if (!Array.isArray(data)) {
      console.error("Products response is not an array:", data);
      return;
    }

    products = data;
    render(products);
  } catch (err) {
    console.error("Failed to load products:", err);
  }
}

// RENDER PRODUCTS
function render(data) {
  const productsDiv = document.getElementById("products");
  productsDiv.innerHTML = "";

  data.forEach((p) => {
    productsDiv.innerHTML += `
      <div class="card" onclick="openModal(${p.id})">
        <img src="${p.image_url || ""}" alt="${escapeHtml(p.name || "Product")}">
        <h3>${escapeHtml(p.name || "No name")}</h3>
        <p>${Number(p.price || 0)}$</p>
      </div>
    `;
  });
}

// SEARCH
function searchProducts() {
  const searchInput = document.getElementById("search");
  const value = searchInput.value.toLowerCase();

  const filtered = products.filter((p) =>
    (p.name || "").toLowerCase().includes(value)
  );

  render(filtered);
}

// OPEN MODAL
function openModal(id) {
  selected = products.find((p) => p.id === id);
  if (!selected) return;

  document.getElementById("m-img").src = selected.image_url || "";
  document.getElementById("m-name").innerText = selected.name || "No name";
  document.getElementById("m-desc").innerText = selected.description || "No description";
  document.getElementById("m-price").innerText = `${Number(selected.price || 0)}$`;
  document.getElementById("qty").value = 1;

  document.getElementById("modal").style.display = "flex";
}

// CLOSE MODAL
function closeModal() {
  document.getElementById("modal").style.display = "none";
}

// ADD TO CART FROM MODAL
function addToCartFromModal() {
  if (!selected) return;

  const qtyInput = document.getElementById("qty");
  const qty = parseInt(qtyInput.value || "1", 10);

  if (isNaN(qty) || qty <= 0) {
    alert("Enter a valid quantity");
    return;
  }

  const existing = cart.find((x) => x.id === selected.id);

  if (existing) {
    existing.qty += qty;
  } else {
    cart.push({
      id: selected.id,
      name: selected.name || "No name",
      price: Number(selected.price || 0),
      description: selected.description || "",
      image_url: selected.image_url || "",
      qty: qty
    });
  }

  closeModal();
  renderCart();
  openCart();
}

// RENDER CART
function renderCart() {
  const cartDiv = document.getElementById("cart");
  const totalText = document.getElementById("total");

  cartDiv.innerHTML = "";
  let total = 0;

  if (cart.length === 0) {
    cartDiv.innerHTML = `<div class="empty-text">No products selected yet.</div>`;
    totalText.innerText = "Total: $0";
    return;
  }

  cart.forEach((item) => {
    const itemTotal = item.price * item.qty;
    total += itemTotal;

    cartDiv.innerHTML += `
      <div class="cart-item">
        <div class="cart-item-title">${escapeHtml(item.name)}</div>
        <div class="cart-item-line">Price: $${item.price}</div>
        <div class="cart-item-line">Quantity: ${item.qty}</div>
        <div class="cart-item-line">Subtotal: $${itemTotal}</div>
        <div class="qty-row">
          <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
          <button class="qty-btn" onclick="changeQty(${item.id}, -1)">-</button>
          <button class="remove-btn" onclick="removeItem(${item.id})">Remove</button>
        </div>
      </div>
    `;
  });

  totalText.innerText = "Total: $" + total;
}

// CHANGE QUANTITY
function changeQty(id, delta) {
  const item = cart.find((x) => x.id === id);
  if (!item) return;

  item.qty += delta;

  if (item.qty <= 0) {
    cart = cart.filter((x) => x.id !== id);
  }

  renderCart();
}

// REMOVE ITEM
function removeItem(id) {
  cart = cart.filter((x) => x.id !== id);
  renderCart();
}

// TOGGLE CART
function toggleCart() {
  const panel = document.getElementById("cartPanel");
  panel.classList.toggle("open");
}

function openCart() {
  document.getElementById("cartPanel").classList.add("open");
}

// SEND ORDER
async function sendOrder() {
  if (cart.length === 0) {
    alert("Your order is empty");
    return;
  }

  let total = 0;
  let message = "Hello, I want to order:\n\n";

  for (const item of cart) {
    total += item.price * item.qty;

    message += `Product: ${item.name}\n`;
    message += `Price: $${item.price}\n`;
    message += `Quantity: ${item.qty}\n`;
    message += `Subtotal: $${item.price * item.qty}\n\n`;

    try {
      await fetch(API + "/orders", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          product_name: item.name,
          quantity: item.qty,
          price: item.price
        })
      });
    } catch (err) {
      console.error("Failed to save order item:", err);
    }
  }

  message += `Total: $${total}`;

  window.open(`https://wa.me/96181958288?text=${encodeURIComponent(message)}`, "_blank");
}

// BACK
function goBack() {
  window.location.href = "index.html";
}

// ESCAPE HTML
function escapeHtml(text) {
  return String(text)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

// CLOSE MODAL ON OUTSIDE CLICK
window.addEventListener("click", function(e) {
  const modal = document.getElementById("modal");
  if (e.target === modal) {
    closeModal();
  }
});

// INIT
loadProducts();
renderCart();
</script>

</body>
</html>
